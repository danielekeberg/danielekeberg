name: generate-snake-game-from-github-contribution-grid

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: Platane/snk@v3.5.0
        with:
          github_user_name: danielekeberg
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

            - name: Remove progress bar from SVG
        run: |
          chmod +w dist/github-contribution-grid-snake-dark.svg

          python - <<'PY'
          from pathlib import Path
          import re

          file = Path("dist/github-contribution-grid-snake-dark.svg")
          svg = file.read_text(encoding="utf-8")

          svg = re.sub(r'<rect class="u u[0-9]+"[^>]*/>', '', svg)
          svg = re.sub(r'\.u\{[^}]*\}', '', svg)
          svg = re.sub(r'@keyframes u[0-9]+\{.*?\}\.u\.u[0-9]+\{[^}]*\}', '', svg)

          file.write_text(svg, encoding="utf-8")
          PY

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
